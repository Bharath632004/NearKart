# ============================================================
# NearKart - PostgreSQL + PostGIS Docker Compose
# Use: docker-compose up -d
# ============================================================

version: '3.9'

services:

  nearkart-postgres:
    image: postgis/postgis:15-3.3
    container_name: nearkart_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nearkart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nearkart123}
      POSTGRES_DB: ${POSTGRES_DB:-nearkart_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nearkart -d nearkart_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nearkart-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nearkart_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@nearkart.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      nearkart-postgres:
        condition: service_healthy
    networks:
      - nearkart-network

volumes:
  postgres_data:
    driver: local

networks:
  nearkart-network:
    name: nearkart-network
    driver: bridge
