# ═══════════════════════════════════════════════════════════════════
#  NearKart – Docker Build & Push to Docker Hub
#  Triggers on push to main (after backend-ci passes)
# ═══════════════════════════════════════════════════════════════════
name: Docker Build & Push

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    name: Build & Push – ${{ matrix.service }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        service:
          - discovery-server
          - auth-service
          - user-service
          - product-service
          - order-service
          - shop-service
          - merchant-service
          - inventory-service
          - delivery-service
          - payment-service
          - notification-service
          - analytics-service
          - admin-service
          - api-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests -q
        working-directory: backend/${{ matrix.service }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: backend/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nearkart-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nearkart-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
