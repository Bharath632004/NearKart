name: Mobile CI

on:
  push:
    branches: [ develop, main ]
    paths:
      - 'mobile-app/**'
  pull_request:
    branches: [ develop, main ]

jobs:
  flutter-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Install dependencies
        working-directory: mobile-app
        run: flutter pub get
        continue-on-error: true

      - name: Run tests
        working-directory: mobile-app
        run: flutter test
        continue-on-error: true
