name: Mobile CI

on:
  push:
    branches: [ develop, main ]
    paths:
      - 'mobile-app/**'
  pull_request:
    branches: [ develop, main ]
    paths:
      - 'mobile-app/**'

jobs:
  flutter-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: mobile-app
        run: flutter pub get

      - name: Analyze code
        working-directory: mobile-app
        run: flutter analyze

      - name: Run tests
        working-directory: mobile-app
        run: flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: mobile-app/coverage/lcov.info
          retention-days: 7
