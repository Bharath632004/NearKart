name: Frontend CI

on:
  push:
    branches: [ develop, main ]
    paths:
      - 'frontend-web/**'
      - 'admin-panel/**'
  pull_request:
    branches: [ develop, main ]
    paths:
      - 'frontend-web/**'
      - 'admin-panel/**'

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install dependencies
        working-directory: frontend-web
        run: npm ci

      - name: Lint
        working-directory: frontend-web
        run: npm run lint --if-present

      - name: Build Frontend
        working-directory: frontend-web
        run: npm run build

  build-admin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        working-directory: admin-panel
        run: npm ci

      - name: Lint
        working-directory: admin-panel
        run: npm run lint --if-present

      - name: Build Admin Panel
        working-directory: admin-panel
        run: npm run build
