name: Frontend CI

on:
  push:
    branches: [ develop, main ]
    paths:
      - 'frontend-web/**'
      - 'admin-panel/**'
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        working-directory: frontend-web
        run: |
          npm install
          npm run build
        continue-on-error: true
