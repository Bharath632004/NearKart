name: Backend CI

on:
  push:
    branches: [ develop, main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ develop, main ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and Test Auth Service
        working-directory: backend/auth-service
        run: mvn clean test
        continue-on-error: true

      - name: Build and Test Order Service
        working-directory: backend/order-service
        run: mvn clean test
        continue-on-error: true
