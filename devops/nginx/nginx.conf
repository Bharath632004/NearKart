# ═══════════════════════════════════════════════════
#  NearKart – Nginx Reverse Proxy Config
# ═══════════════════════════════════════════════════

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Gzip ────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Upstream – API Gateway ───────────────────────
    upstream api_gateway {
        server api-gateway:8080;
    }

    server {
        listen 80;
        server_name _;

        # ── Frontend static files ───────────────────
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── Proxy all /api/* → Spring API Gateway ───
        location /api/ {
            proxy_pass         http://api_gateway/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 90;
        }

        # ── Eureka Dashboard ────────────────────────
        location /eureka/ {
            proxy_pass http://discovery-server:8761/;
            proxy_set_header Host $host;
        }

        # ── Actuator health (internal only) ─────────
        location /actuator/health {
            proxy_pass http://api_gateway/actuator/health;
        }
    }
}
