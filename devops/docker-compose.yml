        condition: service_healthy

  # ─── Payment Service ─────────────────────────────────────────────

  payment-service:
    build:
      context: ../backend/payment-service
      dockerfile: Dockerfile
    container_name: nearkart-payment-service
    restart: unless-stopped
    ports:
      - "8089:8089"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nearkart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nearkart_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nearkart_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # ─── Notification Service ────────────────────────────────────────

  notification-service:
    build:
      context: ../backend/notification-service
      dockerfile: Dockerfile
    container_name: nearkart-notification-service
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nearkart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nearkart_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nearkart_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # ─── Analytics Service ───────────────────────────────────────────

  analytics-service:
    build:
      context: ../backend/analytics-service
      dockerfile: Dockerfile
    container_name: nearkart-analytics-service
