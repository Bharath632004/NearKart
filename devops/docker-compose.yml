      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # ─── API Gateway (entry point for all frontend traffic) ─────────

  api-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    container_name: nearkart-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      discovery-server:
        condition: service_healthy
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started

  # ─── Frontend (React + Vite) ─────────────────────────────────────

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: nearkart-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8080/api
    depends_on:
      - api-gateway

# ─── Volumes ──────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
