      dockerfile: Dockerfile
    container_name: nearkart-shop-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nearkart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nearkart_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nearkart_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # ─── Merchant Service ────────────────────────────────────────────

  merchant-service:
    build:
      context: ../backend/merchant-service
      dockerfile: Dockerfile
    container_name: nearkart-merchant-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nearkart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nearkart_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nearkart_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
