      discovery-server:
        condition: service_healthy

  # ─── Inventory Service ───────────────────────────────────────────

  inventory-service:
    build:
      context: ../backend/inventory-service
      dockerfile: Dockerfile
    container_name: nearkart-inventory-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nearkart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nearkart_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nearkart_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
