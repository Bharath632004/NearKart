  # ─── Delivery Service ────────────────────────────────────────────

  delivery-service:
    build:
      context: ../backend/delivery-service
      dockerfile: Dockerfile
    container_name: nearkart-delivery-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nearkart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nearkart_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nearkart_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
