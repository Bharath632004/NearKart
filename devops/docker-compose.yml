version: '3.8'

# ═══════════════════════════════════════════════════════════════════
#  NearKart – Full Stack Docker Compose
#  Run: docker-compose up --build  (from /devops folder)
# ═══════════════════════════════════════════════════════════════════

services:

  # ─── Infrastructure ─────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: nearkart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nearkart}
      POSTGRES_USER: ${POSTGRES_USER:-nearkart_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nearkart_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nearkart_user} -d ${POSTGRES_DB:-nearkart}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nearkart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Discovery Server (Eureka) – start before all services ──────

  discovery-server:
    build:
      context: ../backend/discovery-server
      dockerfile: Dockerfile
    container_name: nearkart-discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ─── Auth Service ────────────────────────────────────────────────

  auth-service:
    build:
      context: ../backend/auth-service
      dockerfile: Dockerfile
    container_name: nearkart-auth-service
    restart: unless-stopped
    ports:
      - "8084:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nearkart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nearkart_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nearkart_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # ─── User Service ────────────────────────────────────────────────

  user-service:
    build:
      context: ../backend/user-service
      dockerfile: Dockerfile
    container_name: nearkart-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nearkart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nearkart_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nearkart_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # ─── Product Service ─────────────────────────────────────────────

  product-service:
    build:
      context: ../backend/product-service
      dockerfile: Dockerfile
    container_name: nearkart-product-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nearkart}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-nearkart_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-nearkart_pass}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  # ─── Order Service ───────────────────────────────────────────────

  order-service:
