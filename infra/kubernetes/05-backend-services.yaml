# ─────────────────────────────────────────────────────────────────────────────
# All NearKart backend microservices
# Replace <AWS_ACCOUNT_ID> with your real AWS account ID
# ─────────────────────────────────────────────────────────────────────────────

# ── Auth Service ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: nearkart
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/nearkart/auth-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nearkart-common-config
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: nearkart-db-secret
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nearkart-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nearkart-db-secret
                  key: password
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: nearkart-redis-secret
                  key: host
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: nearkart-app-secret
                  key: jwt-secret
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: nearkart
spec:
  selector:
    app: auth-service
  ports:
    - port: 8080
      targetPort: 8080
---

