      discovery-server:
        condition: service_healthy
    networks: [nearkart-net]

  # ── Order Service ─────────────────────────────────────────────────────────────
  order-service:
    build:
      context: ../../backend/order-service
      dockerfile: ../../infra/docker/Dockerfile.backend-service
    container_name: nearkart-order
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nearkartdb
      SPRING_DATASOURCE_USERNAME: nearkart_admin
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-localdevpassword}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
