      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks: [nearkart-net]

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
    container_name: nearkart-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks: [nearkart-net]

  # ── Admin Panel ───────────────────────────────────────────────────────────────
  admin-panel:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.admin-panel
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
    container_name: nearkart-admin-panel
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      - api-gateway
    networks: [nearkart-net]

  # ── NGINX Reverse Proxy (local) ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nearkart-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - admin-panel
      - api-gateway
    networks: [nearkart-net]
