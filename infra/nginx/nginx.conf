# ─────────────────────────────────────────────────────────────────────────────
# NearKart NGINX Reverse Proxy — Local Development
# Routes:  /api/*  → api-gateway:8080
#          /admin  → admin-panel:3001
#          /*      → frontend:3000
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream api_gateway {
        server api-gateway:8080;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:3000;
        keepalive 16;
    }

    upstream admin_panel {
        server admin-panel:3001;
        keepalive 16;
    }

    # ── Main Server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # ── API → API Gateway ─────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_gateway/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        # ── Eureka dashboard (dev only) ───────────────────────────────────────
        location /eureka {
            proxy_pass http://discovery-server:8761;
            proxy_set_header Host $host;
        }

        # ── Admin Panel ───────────────────────────────────────────────────────
        location /admin {
            proxy_pass         http://admin_panel;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # ── Frontend (catch-all) ──────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
        }

        # ── Health check endpoint ─────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
