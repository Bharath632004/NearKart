plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace "com.nearkart.app"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.nearkart.app"
        minSdk 21
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        multiDexEnabled true
    }

    signingConfigs {
        // TODO: Replace with your actual keystore for production releases.
        // See: https://docs.flutter.dev/deployment/android#signing-the-app
        // Example:
        // release {
        //     storeFile file(System.getenv("KEYSTORE_PATH") ?: "keystore/release.jks")
        //     storePassword System.getenv("KEYSTORE_PASSWORD")
        //     keyAlias System.getenv("KEY_ALIAS")
        //     keyPassword System.getenv("KEY_PASSWORD")
        // }
    }

    buildTypes {
        release {
            // NOTE: signingConfig signingConfigs.debug was removed.
            // Configure a real signingConfig above before releasing to Play Store.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-analytics'
}
