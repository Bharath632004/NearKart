name: nearkart
description: NearKart - Hyperlocal delivery app connecting customers with nearby shops.

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP
  http: ^1.2.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.20

  # Local notifications (FCM foreground + background display)
  flutter_local_notifications: ^17.1.2

  # Payments
  razorpay_flutter: ^1.3.7

  # Location
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3

  # UI Utilities
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Secure storage for JWT
  flutter_secure_storage: ^9.0.0

  # Shared preferences (used by ApiService and AuthProvider)
  shared_preferences: ^2.2.3

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
