server:
  port: 8080

spring:
  application:
    name: api-gateway

  # Redis for rate limiting
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      # Default filters applied to ALL routes
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 20
            redis-rate-limiter.burstCapacity: 40
            redis-rate-limiter.requestedTokens: 1
            key-resolver: "#{@ipKeyResolver}"
        - name: CircuitBreaker
          args:
            name: defaultCB
            fallbackUri: forward:/fallback

      routes:
        # ─── Auth Service (public) ────────────────────────────────────────────
        - id: auth-service-public
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: auth-service

        # ─── User Service (protected) ─────────────────────────────────────────
        - id: user-service-protected
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: user-service

        # ─── User Service v1 (profile + addresses) ────────────────────────────
        - id: user-service-v1
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: user-service

        # ─── Product Service ──────────────────────────────────────────────────
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: product-service

        # ─── Order Service ────────────────────────────────────────────────────
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: order-service

        # ─── Cart (part of order-service) ─────────────────────────────────────
        - id: cart-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/cart/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: order-service

        # ─── Shop Service ─────────────────────────────────────────────────────
        - id: shop-service
          uri: lb://shop-service
          predicates:
            - Path=/api/shops/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: shop-service

        # ─── Merchant Service ─────────────────────────────────────────────────
        - id: merchant-service
          uri: lb://merchant-service
          predicates:
            - Path=/api/v1/merchants/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: merchant-service

        # ─── Merchant Settlements ─────────────────────────────────────────────
        - id: settlement-service
          uri: lb://merchant-service
          predicates:
            - Path=/api/v1/settlements/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: merchant-service

        # ─── Payment Service ──────────────────────────────────────────────────
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: payment-service

        # ─── Refund Service (part of payment-service) ─────────────────────────
        - id: refund-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/refunds/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: payment-service

        # ─── Wallet (part of payment-service) ────────────────────────────────
        - id: wallet-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/wallet/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: payment-service

        # ─── Delivery Service ─────────────────────────────────────────────────
        - id: delivery-tracking
          uri: lb://delivery-service
          predicates:
            - Path=/api/v1/delivery/tracking/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: delivery-service

        - id: delivery-assignments
          uri: lb://delivery-service
          predicates:
            - Path=/api/v1/delivery/assignments/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: delivery-service

        - id: delivery-partners
          uri: lb://delivery-service
          predicates:
            - Path=/api/v1/delivery/partners/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: delivery-service

        - id: delivery-earnings
          uri: lb://delivery-service
          predicates:
            - Path=/api/v1/delivery/earnings/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: delivery-service

        # ─── Notification Service ─────────────────────────────────────────────
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: notification-service

        # ─── Analytics Service ────────────────────────────────────────────────
        - id: analytics-sales
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/sales/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: analytics-service

        - id: analytics-customers
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/customers/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: analytics-service

        - id: analytics-merchants
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/merchants/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: analytics-service

        - id: analytics-delivery
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/delivery/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: analytics-service

        - id: analytics-dashboard
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/dashboard/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: analytics-service

        # ─── Admin Service ────────────────────────────────────────────────────
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**
          filters:
            - StripPrefix=0
            - JwtAuthFilter
            - name: AddRequestHeader
              args:
                name: X-Service-Name
                value: admin-service

      # Global CORS
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "${FRONTEND_URL:http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            exposedHeaders:
              - Authorization
              - X-Request-Id
            allowCredentials: true
            maxAge: 3600

# Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10

# JWT
jwt:
  secret: ${JWT_SECRET:NearKartSuperSecretKey2024MustBe256BitsLongForHS256Algorithm!}
  expiration: 86400000  # 24 hours in ms

# Resilience4j Circuit Breaker
resilience4j:
  circuitbreaker:
    instances:
      defaultCB:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  timelimiter:
    instances:
      defaultCB:
        timeoutDuration: 5s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,routes,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.nearkart.gateway: DEBUG
    reactor.netty: INFO
