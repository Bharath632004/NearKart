version: '3.8'

services:

  # ─── Infrastructure ───────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: nearkart-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-nearkart}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: nearkart-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: nearkart-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: nearkart-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # ─── Service Discovery ────────────────────────────────────────
  discovery-server:
    build: ./discovery-server
    container_name: nearkart-discovery
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─── API Gateway ──────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: nearkart-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-nearkart-secret-key-change-in-production}
    depends_on:
      discovery-server:
        condition: service_healthy

  # ─── Core Services ────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    container_name: nearkart-auth
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_auth
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-nearkart-secret-key-change-in-production}
      - KAFKA_SERVERS=kafka:29092
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: nearkart-user
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_user
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - KAFKA_SERVERS=kafka:29092
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  product-service:
    build: ./product-service
    container_name: nearkart-product
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_product
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - KAFKA_SERVERS=kafka:29092
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  shop-service:
    build: ./shop-service
    container_name: nearkart-shop
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_shop
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - KAFKA_SERVERS=kafka:29092
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: nearkart-order
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_order
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - KAFKA_SERVERS=kafka:29092
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  payment-service:
    build: ./payment-service
    container_name: nearkart-payment
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_payment
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - KAFKA_SERVERS=kafka:29092
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  delivery-service:
    build: ./delivery-service
    container_name: nearkart-delivery
    ports:
      - "8087:8087"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_delivery
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - KAFKA_SERVERS=kafka:29092
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    container_name: nearkart-notification
    ports:
      - "8088:8088"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_notification
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - KAFKA_SERVERS=kafka:29092
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  inventory-service:
    build: ./inventory-service
    container_name: nearkart-inventory
    ports:
      - "8089:8089"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_inventory
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - KAFKA_SERVERS=kafka:29092
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  merchant-service:
    build: ./merchant-service
    container_name: nearkart-merchant
    ports:
      - "8090:8090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_merchant
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - KAFKA_SERVERS=kafka:29092
