      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  analytics-service:
    build: ./analytics-service
    container_name: nearkart-analytics
    ports:
      - "8091:8091"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_analytics
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
      - KAFKA_SERVERS=kafka:29092
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy

  admin-service:
    build: ./admin-service
    container_name: nearkart-admin
    ports:
      - "8092:8092"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nearkart_admin
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-nearkart}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-root}
      - EUREKA_SERVER=http://discovery-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
