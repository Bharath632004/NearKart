# ─── Development Profile ────────────────────────────────────────────────────
# Usage: set SPRING_PROFILES_ACTIVE=dev  (or run with --spring.profiles.active=dev)

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nearkart_merchant
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

eureka:
  client:
    enabled: false   # Disable Eureka in local dev (no service registry needed)

aws:
  s3:
    bucket-name: nearkart-kyc-docs-dev
    region: ap-south-1
    access-key: ""    # Set via env var AWS_ACCESS_KEY or use LocalStack
    secret-key: ""    # Set via env var AWS_SECRET_KEY or use LocalStack

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

logging:
  level:
    com.nearkart: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
