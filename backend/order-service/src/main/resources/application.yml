server:
  port: 8082

spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nearkart_orders}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_schema: public

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  cancel-window-minutes: 10
  return-window-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.nearkart: DEBUG
    org.springframework.security: INFO
