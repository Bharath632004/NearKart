server:
  port: 8086
  servlet:
    context-path: /

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/nearkart_db
    username: ${DB_USERNAME:nearkart}
    password: ${DB_PASSWORD:nearkart123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 20

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
      acks: all           # Wait for all replicas
      retries: 3
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: MANUAL_IMMEDIATE

nearkart:
  kafka:
    topics:
      order-placed:         nearkart.order.placed
      order-status-changed: nearkart.order.status.changed
      order-cancelled:      nearkart.order.cancelled
      payment-success:      nearkart.payment.success
      payment-failed:       nearkart.payment.failed
    consumer:
      group-id: order-service-group

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    in.nearkart: DEBUG
    org.apache.kafka: WARN
