server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/nearkart_auth
    username: ${DB_USER:nearkart}
    password: ${DB_PASS:nearkart123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASS:}
      timeout: 2000ms

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  jwt:
    secret: ${JWT_SECRET:NearKartSuperSecretKey2024NearKartSuperSecretKey2024}
    access-token-expiry: 900000       # 15 minutes
    refresh-token-expiry: 2592000000  # 30 days
  otp:
    expiry-minutes: 5
    length: 6
  bcrypt:
    strength: 12

logging:
  level:
    com.nearkart: DEBUG
    org.springframework.security: WARN
