server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:5433/nearkart
    username: postgres
    password: Bharath@2004

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ""
    password: ""
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: TmVhcktBUlRTdXBlclNlY3JldEtleTIwMjZTZWN1cmVTdHJpbmc=
  expiry-ms: 900000
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

app:
  otp:
    expiry-minutes: 5
    length: 6
  password-reset:
    expiry-minutes: 15
  frontend-url: http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.nearkart: DEBUG
    org.springframework.security: INFO