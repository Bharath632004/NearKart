server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/nearkart
    username: postgres
    password: your_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/

jwt:
  secret: your_256bit_secret_string_here_your_256bit_xx
  expiry-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
