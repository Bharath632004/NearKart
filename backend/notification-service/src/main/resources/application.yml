server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: notification-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nearkart_notifications}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

# Twilio
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:ACxxxxxxxxxxxxxxxx}
  auth-token: ${TWILIO_AUTH_TOKEN:your_auth_token}
  from-number: ${TWILIO_FROM_NUMBER:+1234567890}

# Firebase
firebase:
  service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:{}}

# Custom
app:
  mail:
    from-name: NearKart

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
