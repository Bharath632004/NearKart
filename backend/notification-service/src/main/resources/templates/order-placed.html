<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Order Placed</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 30px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header { background: #2e7d32; color: white; padding: 24px; text-align: center; }
    .body { padding: 24px; color: #333; }
    .order-id { font-size: 20px; font-weight: bold; color: #2e7d32; }
    .footer { background: #f4f4f4; text-align: center; padding: 12px; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>NearKart</h1>
      <p>Your Order is Confirmed! 🎉</p>
    </div>
    <div class="body">
      <p>Hi there,</p>
      <p>We've received your order and it's being processed.</p>
      <p>Order ID: <span class="order-id" th:text="${orderId}">ORD-XXXXX</span></p>
      <p>We'll send you another notification once your order ships.</p>
      <p>Thank you for shopping with <strong>NearKart</strong>!</p>
    </div>
    <div class="footer">
      &copy; 2025 NearKart. All rights reserved.
    </div>
  </div>
</body>
</html>
