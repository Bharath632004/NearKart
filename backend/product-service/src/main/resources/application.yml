server:
  port: 8082

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://localhost:5432/nearkart
    username: nearkart_user
    password: nearkart_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: nearkart-secret-key-for-jwt-signing-must-be-long-enough-256-bits
  expiration: 86400000

logging:
  level:
    com.nearkart: DEBUG
