server:
  port: 8084

spring:
  application:
    name: shop-service
  datasource:
    url: jdbc:postgresql://localhost:5432/nearkart_shops
    username: nearkart
    password: nearkart123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
