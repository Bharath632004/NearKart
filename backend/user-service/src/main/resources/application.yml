server:
  port: 8082

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/nearkart_users
    username: ${DB_USERNAME:nearkart}
    password: ${DB_PASSWORD:nearkart123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

app:
  jwt:
    # Must be a Base64-encoded string representing >= 256 bits (32 bytes)
    # Generate with: openssl rand -base64 32
    secret: ${JWT_SECRET:bmVhcmthcnQtc3VwZXItc2VjcmV0LWtleS0yMDI2LW11c3QtYmUtMjU2LWJpdHM=}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  internal:
    # Shared secret for internal service-to-service calls (e.g., auth-service -> user-service)
    # Override in production via INTERNAL_SECRET env variable
    secret: ${INTERNAL_SECRET:nearkart-internal-secret-2026}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.nearkart: DEBUG
    org.springframework.security: INFO
