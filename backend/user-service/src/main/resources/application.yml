server:
  port: 8082

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/nearkart_users
    username: ${DB_USERNAME:nearkart}
    password: ${DB_PASSWORD:nearkart123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:nearkart-super-secret-key-2026-must-be-256-bits-long-minimum}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.nearkart: DEBUG
