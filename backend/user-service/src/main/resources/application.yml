server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nearkart
    username: postgres
    password: your_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: NearKartSecretKey2024SuperLongSecureKeyForHS256Algorithm
    expiration-ms: 86400000  # 24 hours
